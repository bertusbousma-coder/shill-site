<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shill — Login</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--ac:#2a8fc4;--ac2:#1b6a96;--ac3:#4db8e0;--glow:rgba(42,143,196,0.38);}
    html,body{height:100%;font-family:'Figtree',sans-serif;background:#000;color:#fff;overflow:hidden;}

    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);}
    .b1{width:700px;height:700px;top:-200px;left:-180px;background:radial-gradient(circle,rgba(16,52,115,0.55) 0%,transparent 70%);animation:d1 24s ease-in-out infinite alternate;}
    .b2{width:620px;height:620px;bottom:-190px;right:-150px;background:radial-gradient(circle,rgba(20,68,140,0.45) 0%,transparent 70%);animation:d2 28s ease-in-out infinite alternate;}
    .b3{width:350px;height:350px;top:50%;right:20%;background:radial-gradient(circle,rgba(42,143,196,0.2) 0%,transparent 70%);filter:blur(70px);animation:d1 16s ease-in-out infinite alternate;}
    @keyframes d1{0%{transform:translate(0,0);}100%{transform:translate(50px,35px);}}
    @keyframes d2{0%{transform:translate(0,0);}100%{transform:translate(-40px,-30px);}}
    #dots2{position:fixed;inset:0;z-index:1;pointer-events:none;}

    .page{position:relative;z-index:10;height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:24px;}

    .back{position:fixed;top:18px;left:22px;z-index:200;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);text-decoration:none;transition:color .2s;opacity:0;animation:fadeIn .5s .1s ease forwards;}
    .back:hover{color:#fff;}
    .back svg{width:15px;height:15px;}

    .card{width:100%;max-width:400px;background:rgba(6,12,22,0.92);border:1px solid rgba(42,143,196,0.18);border-radius:22px;padding:40px 36px 32px;box-shadow:0 32px 100px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.03),0 0 60px rgba(42,143,196,0.06);position:relative;overflow:hidden;opacity:0;animation:fadeUp .55s .15s ease forwards;}
    .card::before{content:'';position:absolute;width:300px;height:300px;top:-120px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(42,143,196,0.12) 0%,transparent 70%);pointer-events:none;}

    .card-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:10px;}
    .card-logo img{height:52px;width:auto;filter:drop-shadow(0 0 20px rgba(42,143,196,0.6));}
    .card-logo-fb{font-size:22px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#fff;}
    .card-logo-sub{font-size:11px;color:rgba(255,255,255,0.28);letter-spacing:.06em;text-transform:uppercase;}

    .card h2{font-size:20px;font-weight:800;text-align:center;color:#fff;margin-bottom:6px;}
    .card-desc{font-size:13.5px;color:rgba(255,255,255,0.42);text-align:center;line-height:1.6;margin-bottom:28px;}

    .input-wrap{position:relative;margin-bottom:14px;}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(255,255,255,0.3);}
    input[type="email"]{width:100%;padding:13px 14px 13px 40px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:11px;font-family:'Figtree',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
    input[type="email"]::placeholder{color:rgba(255,255,255,0.28);}
    input[type="email"]:focus{border-color:rgba(42,143,196,0.5);box-shadow:0 0 0 3px rgba(42,143,196,0.12);}

    .send-btn{width:100%;padding:13px;border-radius:11px;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-family:'Figtree',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow),inset 0 1px 0 rgba(255,255,255,0.1);transition:box-shadow .2s,transform .15s;margin-bottom:20px;}
    .send-btn:hover{box-shadow:0 8px 30px var(--glow);transform:translateY(-1px);}
    .send-btn:active{transform:scale(.98);}
    .send-btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}

    .divider{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
    .divider-line{flex:1;height:1px;background:rgba(255,255,255,0.07);}
    .divider-text{font-size:11px;color:rgba(255,255,255,0.25);white-space:nowrap;}

    .secured{display:flex;align-items:center;justify-content:center;gap:7px;font-size:11.5px;color:rgba(255,255,255,0.3);}
    .secured svg{width:13px;height:13px;opacity:.5;}

    .card-social{position:absolute;bottom:14px;right:16px;display:flex;align-items:center;gap:4px;}
    .soc-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;color:rgba(255,255,255,0.28);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);text-decoration:none;transition:color .2s,background .2s;}
    .soc-icon:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.08);}
    .soc-icon svg{width:13px;height:13px;}

    /* ── STEP 2: OTP ── */
    #step1,#step2{transition:opacity .3s,transform .3s;}
    #step2{display:none;}
    .otp-label{font-size:13px;color:rgba(255,255,255,0.45);text-align:center;margin-bottom:6px;line-height:1.5;}
    .otp-label strong{color:rgba(255,255,255,0.8);font-weight:600;}
    .otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
    .otp-box{width:44px;height:52px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);text-align:center;font-family:'Figtree',sans-serif;font-size:22px;font-weight:700;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;caret-color:var(--ac3);}
    .otp-box:focus{border-color:rgba(42,143,196,0.5);box-shadow:0 0 0 3px rgba(42,143,196,0.12);}
    .otp-box.filled{border-color:rgba(42,143,196,0.35);}
    .verify-btn{width:100%;padding:13px;border-radius:11px;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-family:'Figtree',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 20px var(--glow),inset 0 1px 0 rgba(255,255,255,0.1);transition:box-shadow .2s,transform .15s;margin-bottom:12px;}
    .verify-btn:hover{box-shadow:0 8px 30px var(--glow);transform:translateY(-1px);}
    .verify-btn:active{transform:scale(.98);}
    .verify-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .otp-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .otp-back{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:500;color:rgba(255,255,255,0.35);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s;}
    .otp-back:hover{color:rgba(255,255,255,0.7);}
    .otp-back svg{width:12px;height:12px;}
    .otp-resend{font-size:12px;color:rgba(42,143,196,0.7);cursor:pointer;background:none;border:none;font-family:inherit;font-weight:500;transition:color .15s;}
    .otp-resend:hover{color:var(--ac3);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  </style>
</head>
<body>
<div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<canvas id="dots2"></canvas>

<a href="index.html" class="back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  Back
</a>

<div class="page">
  <div class="card">
    <div class="card-logo">
      <img src="logo.png" alt="Shill" onerror="this.style.display='none';document.getElementById('cfb').style.display='block'"/>
      <span id="cfb" class="card-logo-fb" style="display:none">Shill</span>
      <span class="card-logo-sub">shill.site</span>
    </div>

    <!-- STEP 1: Email -->
    <div id="step1">
      <h2>Shill Login</h2>
      <p class="card-desc">Enter your email address to login or sign up.</p>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">Send Code →</button>
    </div>

    <!-- STEP 2: OTP Code -->
    <div id="step2">
      <h2>Verification Code</h2>
      <p class="otp-label">Enter the 6-digit code sent to<br><strong id="otpEmail">your@email.com</strong></p>
      <div class="otp-row">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
      </div>
      <button class="verify-btn" id="verifyBtn" onclick="handleVerify()" disabled>Verify & Login</button>
      <div class="otp-actions">
        <button class="otp-back" onclick="goBack()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <button class="otp-resend" onclick="handleResend()">Resend code</button>
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Secured by Turnkey</span>
      <div class="divider-line"></div>
    </div>
    <div class="secured">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Your email is never stored or shared
    </div>

    <div class="card-social">
      <a href="https://discord.gg/shill" target="_blank" rel="noopener" class="soc-icon" aria-label="Discord">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      </a>
      <a href="https://x.com/shilltrenches" target="_blank" rel="noopener" class="soc-icon" aria-label="X">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>
  </div>
</div>

<script>
let userEmail = '';

function handleSend(){
  const inp = document.getElementById('emailInput');
  const val = inp.value.trim();
  if(!val || !val.includes('@') || !val.includes('.')){
    inp.style.borderColor='rgba(239,68,68,0.5)';
    inp.style.boxShadow='0 0 0 3px rgba(239,68,68,0.1)';
    inp.classList.add('shake');
    setTimeout(()=>{inp.style.borderColor='';inp.style.boxShadow='';},1500);
    return;
  }
  userEmail = val;
  const btn = document.getElementById('sendBtn');
  btn.textContent = 'Sending...';
  btn.disabled = true;
  btn.style.opacity = '0.7';

  setTimeout(()=>{
    document.getElementById('step1').style.opacity='0';
    document.getElementById('step1').style.transform='translateX(-20px)';
    setTimeout(()=>{
      document.getElementById('step1').style.display='none';
      document.getElementById('step2').style.display='block';
      document.getElementById('otpEmail').textContent = userEmail;
      setTimeout(()=>{
        document.getElementById('step2').style.opacity='1';
        document.getElementById('step2').style.transform='translateX(0)';
        document.querySelectorAll('.otp-box')[0].focus();
      },30);
    },300);
  },1400);
}

function goBack(){
  document.getElementById('step2').style.opacity='0';
  document.getElementById('step2').style.transform='translateX(20px)';
  setTimeout(()=>{
    document.getElementById('step2').style.display='none';
    document.querySelectorAll('.otp-box').forEach(b=>{b.value='';b.classList.remove('filled');});
    document.getElementById('verifyBtn').disabled=true;
    const btn=document.getElementById('sendBtn');
    btn.textContent='Send Code →';btn.disabled=false;btn.style.opacity='1';
    btn.style.background='linear-gradient(135deg,var(--ac),var(--ac2))';
    btn.style.boxShadow='0 4px 20px var(--glow)';
    document.getElementById('step1').style.display='block';
    setTimeout(()=>{
      document.getElementById('step1').style.opacity='1';
      document.getElementById('step1').style.transform='translateX(0)';
    },30);
  },250);
}

function handleResend(){
  const btn=document.querySelector('.otp-resend');
  btn.textContent='Sent!';btn.style.color='#22c55e';
  setTimeout(()=>{btn.textContent='Resend code';btn.style.color='';},2000);
}

function handleVerify(){
  const boxes=document.querySelectorAll('.otp-box');
  const code=Array.from(boxes).map(b=>b.value).join('');
  if(code.length<6)return;
  const btn=document.getElementById('verifyBtn');
  btn.textContent='Verifying...';btn.disabled=true;
  setTimeout(()=>{
    btn.textContent='✓ Logged In';
    btn.style.background='linear-gradient(135deg,#16a34a,#15803d)';
    btn.style.boxShadow='0 4px 20px rgba(22,163,74,0.35)';
  },1400);
}

// OTP box logic
(function(){
  const boxes=document.querySelectorAll('.otp-box');
  boxes.forEach((box,i)=>{
    box.addEventListener('input',function(e){
      this.value=this.value.replace(/[^0-9]/g,'');
      if(this.value && i<boxes.length-1) boxes[i+1].focus();
      this.classList.toggle('filled',!!this.value);
      checkOtpComplete();
    });
    box.addEventListener('keydown',function(e){
      if(e.key==='Backspace' && !this.value && i>0){
        boxes[i-1].focus();
        boxes[i-1].value='';
        boxes[i-1].classList.remove('filled');
        checkOtpComplete();
      }
    });
    box.addEventListener('paste',function(e){
      e.preventDefault();
      const data=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);
      data.split('').forEach((ch,j)=>{
        if(boxes[j]){boxes[j].value=ch;boxes[j].classList.add('filled');}
      });
      if(data.length>0) boxes[Math.min(data.length,5)].focus();
      checkOtpComplete();
    });
  });
  function checkOtpComplete(){
    const code=Array.from(boxes).map(b=>b.value).join('');
    document.getElementById('verifyBtn').disabled=code.length<6;
  }
})();

(function(){
  const c=document.getElementById('dots2'),ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;init();}
  function init(){pts=[];const n=Math.floor(W*H/5000);for(let i=0;i<n;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.6+.15,a:Math.random()*.35+.07,phase:Math.random()*Math.PI*2,spd:Math.random()*.003+.001});}
  let t=0;
  function frame(){t+=.01;ctx.clearRect(0,0,W,H);for(const p of pts){const a=p.a*(0.4+0.6*Math.sin(t*p.spd*60+p.phase));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,225,255,${a})`;ctx.fill();}requestAnimationFrame(frame);}
  resize();frame();window.addEventListener('resize',resize);
})();
</script>
</body>
</html>
