<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shill — Login</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:radial-gradient(circle,rgba(255,255,255,0.12) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
    body::after{content:'';position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 20%,#0a0a0a 100%);pointer-events:none;}

    .back{position:fixed;top:18px;left:22px;z-index:200;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.4);text-decoration:none;transition:color .2s;padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);}
    .back:hover{color:#fff;background:rgba(255,255,255,0.07);}
    .back svg{width:14px;height:14px;}

    .page{position:relative;z-index:10;height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:24px;}

    .card{width:100%;max-width:380px;background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:36px 32px 28px;box-shadow:0 32px 80px rgba(0,0,0,0.5);}

    .card-top{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:8px;}
    .card-top img{height:44px;width:auto;border-radius:8px;}
    .card-top-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.03em;}
    .card-top-sub{font-size:11px;color:rgba(255,255,255,0.28);letter-spacing:.04em;text-transform:uppercase;}

    .card h2{font-size:17px;font-weight:700;color:#fff;margin-bottom:5px;text-align:center;}
    .card-desc{font-size:13px;color:rgba(255,255,255,0.38);text-align:center;line-height:1.6;margin-bottom:22px;}

    .input-wrap{position:relative;margin-bottom:12px;}
    .input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:rgba(255,255,255,0.28);}
    input[type="email"]{width:100%;padding:12px 12px 12px 38px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
    input[type="email"]::placeholder{color:rgba(255,255,255,0.22);}
    input[type="email"]:focus{border-color:rgba(255,255,255,0.3);box-shadow:0 0 0 3px rgba(255,255,255,0.06);}

    .send-btn{width:100%;padding:12px;border-radius:8px;background:#fff;color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:background .15s,transform .12s;margin-bottom:18px;}
    .send-btn:hover{background:rgba(255,255,255,0.88);transform:translateY(-1px);}
    .send-btn:active{transform:scale(.98);}
    .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .divider{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .divider-line{flex:1;height:1px;background:rgba(255,255,255,0.07);}
    .divider-text{font-size:11px;color:rgba(255,255,255,0.22);}

    .secured{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11.5px;color:rgba(255,255,255,0.25);}
    .secured svg{width:12px;height:12px;opacity:.45;}

    .social-row{position:absolute;bottom:14px;right:16px;display:flex;gap:4px;}
    .soc-btn{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:rgba(255,255,255,0.28);text-decoration:none;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;}
    .soc-btn:hover{color:#fff;background:rgba(255,255,255,0.09);}
    .soc-btn svg{width:12px;height:12px;}

    /* OTP */
    #step2{display:none;}
    .otp-hint{font-size:13px;color:rgba(255,255,255,0.38);text-align:center;margin-bottom:14px;line-height:1.55;}
    .otp-hint strong{color:rgba(255,255,255,0.75);font-weight:600;}
    .otp-row{display:flex;gap:7px;justify-content:center;margin-bottom:14px;}
    .otp-box{width:43px;height:50px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);text-align:center;font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
    .otp-box:focus{border-color:rgba(255,255,255,0.3);box-shadow:0 0 0 3px rgba(255,255,255,0.06);}
    .otp-box.filled{border-color:rgba(255,255,255,0.25);}
    .verify-btn{width:100%;padding:12px;border-radius:8px;background:#fff;color:#000;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:background .15s,transform .12s;margin-bottom:12px;}
    .verify-btn:hover{background:rgba(255,255,255,0.88);transform:translateY(-1px);}
    .verify-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
    .otp-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
    .otp-back{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.32);cursor:pointer;background:none;border:none;font-family:inherit;transition:color .15s;}
    .otp-back:hover{color:rgba(255,255,255,0.7);}
    .otp-back svg{width:11px;height:11px;}
    .otp-resend{font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;background:none;border:none;font-family:inherit;font-weight:500;transition:color .15s;}
    .otp-resend:hover{color:#fff;}
  </style>
</head>
<body>

<a href="index.html" class="back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  Back
</a>

<div class="page">
  <div class="card" style="position:relative;">

    <div class="card-top">
      <img src="logo.png" alt="Shill" onerror="this.style.display='none'"/>
      <span class="card-top-name">shill</span>
      <span class="card-top-sub">shill.site</span>
    </div>

    <!-- STEP 1 -->
    <div id="step1">
      <h2>Welcome back</h2>
      <p class="card-desc">Enter your email to login or sign up.</p>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">Send Code →</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2">
      <h2>Check your email</h2>
      <p class="otp-hint">Enter the 6-digit code sent to<br/><strong id="otpEmail">your@email.com</strong></p>
      <div class="otp-row">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
      </div>
      <button class="verify-btn" id="verifyBtn" onclick="handleVerify()" disabled>Verify &amp; Login</button>
      <div class="otp-nav">
        <button class="otp-back" onclick="goBack()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <button class="otp-resend" onclick="handleResend()">Resend code</button>
      </div>
    </div>

    <div class="divider"><div class="divider-line"></div><span class="divider-text">Secured by Turnkey</span><div class="divider-line"></div></div>
    <div class="secured">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Your email is never stored or shared
    </div>

    <div class="social-row">
      <a href="https://discord.gg/shill" target="_blank" rel="noopener" class="soc-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      </a>
      <a href="https://x.com/shilltrenches" target="_blank" rel="noopener" class="soc-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>
  </div>
</div>

<script>
let userEmail='';
function handleSend(){
  const inp=document.getElementById('emailInput');
  const val=inp.value.trim();
  if(!val||!val.includes('@')||!val.includes('.')){inp.style.borderColor='rgba(239,68,68,0.5)';setTimeout(()=>{inp.style.borderColor='';},1500);return;}
  userEmail=val;
  const btn=document.getElementById('sendBtn');
  btn.textContent='Sending...';btn.disabled=true;
  setTimeout(()=>{
    document.getElementById('step1').style.display='none';
    const s2=document.getElementById('step2');s2.style.display='block';
    document.getElementById('otpEmail').textContent=userEmail;
    document.querySelectorAll('.otp-box')[0].focus();
  },1200);
}
function goBack(){
  document.getElementById('step2').style.display='none';
  document.querySelectorAll('.otp-box').forEach(b=>{b.value='';b.classList.remove('filled');});
  document.getElementById('verifyBtn').disabled=true;
  const btn=document.getElementById('sendBtn');
  btn.textContent='Send Code →';btn.disabled=false;
  document.getElementById('step1').style.display='block';
}
function handleResend(){const btn=document.querySelector('.otp-resend');btn.textContent='Sent!';setTimeout(()=>{btn.textContent='Resend code';},2000);}
function handleVerify(){
  const code=Array.from(document.querySelectorAll('.otp-box')).map(b=>b.value).join('');
  if(code.length<6)return;
  const btn=document.getElementById('verifyBtn');
  btn.textContent='Verifying...';btn.disabled=true;
  setTimeout(()=>{btn.textContent='✓ Logged In';btn.style.background='#22c55e';btn.style.color='#fff';},1200);
}
(function(){
  const boxes=document.querySelectorAll('.otp-box');
  boxes.forEach((box,i)=>{
    box.addEventListener('input',function(){
      this.value=this.value.replace(/[^0-9]/g,'');
      if(this.value&&i<boxes.length-1)boxes[i+1].focus();
      this.classList.toggle('filled',!!this.value);
      document.getElementById('verifyBtn').disabled=Array.from(boxes).map(b=>b.value).join('').length<6;
    });
    box.addEventListener('keydown',function(e){
      if(e.key==='Backspace'&&!this.value&&i>0){boxes[i-1].focus();boxes[i-1].value='';boxes[i-1].classList.remove('filled');document.getElementById('verifyBtn').disabled=true;}
    });
    box.addEventListener('paste',function(e){
      e.preventDefault();
      const data=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);
      data.split('').forEach((ch,j)=>{if(boxes[j]){boxes[j].value=ch;boxes[j].classList.add('filled');}});
      if(data.length>0)boxes[Math.min(data.length,5)].focus();
      document.getElementById('verifyBtn').disabled=data.length<6;
    });
  });
})();
</script>
</body>
</html>
